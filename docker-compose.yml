services:
  postgres:
    image: postgres:16-alpine
    container_name: backtestbaba-db
    environment:
      POSTGRES_USER: backtest
      POSTGRES_PASSWORD: backtest
      POSTGRES_DB: backtestbaba
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest -d backtestbaba"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backtestbaba-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backtestbaba-backend
    ports:
      - "8000:8000"
    volumes:
      - cache_data:/app/backend/.cache
    environment:
      - CORS_ORIGINS=http://localhost:5174,http://frontend:5174
      - PORT=8000
      - DATABASE_URL=postgresql://backtest:backtest@postgres:5432/backtestbaba
      - PERSISTENCE_ENABLED=true
    networks:
      - backtestbaba-network
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: backtestbaba-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@backtestbaba.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backtestbaba-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000/api
        VITE_WS_URL: ws://localhost:8000/ws
    container_name: backtestbaba-frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_WS_URL=ws://localhost:8000/ws
    networks:
      - backtestbaba-network
    depends_on:
      - backend

networks:
  backtestbaba-network:
    driver: bridge

volumes:
  pg_data:
    driver: local
  pgadmin_data:
    driver: local
  cache_data:
    driver: local
